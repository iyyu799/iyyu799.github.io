<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <style>
        .logo-img {
            height: 40px;
            vertical-align: middle;
            margin-left: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Microsoft Yahei;
            background: #f5f5f5;
            padding-top: 70px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #2c3e50;
            color: #fff;
            line-height: 60px;
            padding: 0 20px;
            z-index: 999;
        }

        .logo {
            float: left;
            font-size: 20px;
            font-weight: bold;
        }

        .nav {
            float: right;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            cursor: pointer;
        }

        .container {
            width: 1000px;
            margin: 20px auto;
        }

        .left {
            width: 200px;
            float: left;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-right: 20px;
            position: relative;
        }

        .center {
            width: 560px;
            float: left;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .right {
            width: 200px;
            position: fixed;
            right: 20px;
            top: 80px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .book-item {
            width: 30%;
            float: left;
            text-align: center;
            padding: 10px;
            margin: 5px;
            position: relative;
            cursor: pointer;
        }

        .book-tag {
            position: absolute;
            top: 0;
            left: 0;
            background: red;
            color: #fff;
            font-size: 12px;
            padding: 2px 5px;
            display: none;
        }

        .book-item:hover .book-tag {
            display: block;
        }

        .book-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .hot-item {
            float: left;
            width: 30%;
            text-align: center;
            margin: 5px;
        }

        .hot-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td,
        th {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: center;
        }

        .clear {
            clear: both;
        }

        .table-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            display: block;
            margin: 5px auto;
        }
    </style>
</head>
